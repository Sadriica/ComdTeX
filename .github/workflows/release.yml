name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            squashfs-tools

      - name: Install frontend dependencies
        run: npm ci

      - name: Build release (draft)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ComdTeX ${{ github.ref_name }}
          releaseBody: |
            ## Instalación

            | Plataforma | Archivo |
            |---|---|
            | Linux (todas las distros) | `.AppImage` — portable, no requiere instalación |
            | Linux Debian/Ubuntu | `.deb` |
            | Arch Linux | `.pkg.tar.zst` — `sudo pacman -U comdtex-*.pkg.tar.zst` |
            | Windows | `.exe` (instalador NSIS) |

            ### Auto-actualización
            La app verifica actualizaciones automáticamente al iniciar.

            ### Dependencias opcionales
            - `pandoc` — para exportar PDF, DOCX y Beamer
            - `zip` — para el backup del vault
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Patch AppImage for EGL compatibility
        if: matrix.os == 'ubuntu-22.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          APPIMAGE=$(find src-tauri/target -name "*.AppImage" | grep -v ".zsync" | head -1)

          # Extract AppImage without FUSE.
          # AppImage Type 2: squashfs starts right after the ELF runtime.
          # Offset = e_shoff + e_shentsize * e_shnum (ELF64 section header table end).
          OFFSET=$(python3 -c "import struct; f=open('$APPIMAGE','rb'); f.seek(40); shoff=struct.unpack('<Q',f.read(8))[0]; f.seek(58); shentsz,shnum=struct.unpack('<HH',f.read(4)); print(shoff+shentsz*shnum)")
          echo "squashfs offset: $OFFSET"
          unsquashfs -o "$OFFSET" -d squashfs-root "$APPIMAGE"

          # Remove bundled libwayland-egl — incompatible with Mesa 24+.
          rm -f squashfs-root/usr/lib/libwayland-egl.so.1

          # Remove forced GDK_BACKEND=x11 and add WEBKIT_DISABLE_DMABUF_RENDERER.
          sed -i '/export GDK_BACKEND=x11/d' squashfs-root/apprun-hooks/linuxdeploy-plugin-gtk.sh
          echo 'export WEBKIT_DISABLE_DMABUF_RENDERER=1' >> squashfs-root/apprun-hooks/linuxdeploy-plugin-gtk.sh

          # Repack (--appimage-extract-and-run bypasses FUSE on GitHub runners)
          wget -q -O appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run squashfs-root "$APPIMAGE"
          rm -rf squashfs-root appimagetool

          # Re-sign patched AppImage for auto-updater
          npx tauri signer sign "$APPIMAGE" \
            --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
            --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"

          # Update latest.json with the new AppImage signature so auto-updates work
          gh release download "${{ github.ref_name }}" -p "latest.json" \
            --repo "${{ github.repository }}" 2>/dev/null || true
          if [ -f latest.json ]; then
            SIG=$(cat "${APPIMAGE}.sig")
            python3 -c "import json,sys; d=json.load(open('latest.json')); d.get('platforms',{}).get('linux-x86_64',{}).update({'signature':sys.argv[1]}); json.dump(d,open('latest.json','w'),indent=2)" "$SIG"
            gh release upload "${{ github.ref_name }}" latest.json \
              --clobber --repo "${{ github.repository }}"
          fi

          # Replace AppImage and sig in the draft release
          gh release upload "${{ github.ref_name }}" "$APPIMAGE" "${APPIMAGE}.sig" \
            --clobber \
            --repo "${{ github.repository }}"

  arch-release:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Arch system dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel git curl wget \
            nodejs npm \
            webkit2gtk-4.1 \
            libappindicator-gtk3 \
            librsvg \
            patchelf \
            openssl \
            appmenu-gtk-module \
            github-cli

      - name: Install Rust stable
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "/root/.cargo/bin" >> $GITHUB_PATH

      - name: Install frontend dependencies
        run: npm ci

      - name: Build pacman package
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --bundles pacman

      - name: Upload pacman package to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PKG=$(find src-tauri/target -name "*.pkg.tar.zst" | head -1)
          gh release upload "${{ github.ref_name }}" "$PKG" \
            --clobber \
            --repo "${{ github.repository }}"

  publish:
    needs: [build, arch-release]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --draft=false \
            --repo "${{ github.repository }}"
