name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    permissions:
      contents: write

    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify version consistency
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python3 -c "import json; print(json.load(open('package.json'))['version'])")
          CARGO_VERSION=$(grep -m1 '^version = ' src-tauri/Cargo.toml | cut -d'"' -f2)
          TAURI_VERSION=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")

          echo "Tag version:         $TAG_VERSION"
          echo "package.json:        $PKG_VERSION"
          echo "Cargo.toml:          $CARGO_VERSION"
          echo "tauri.conf.json:     $TAURI_VERSION"

          FAIL=0
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            FAIL=1
          fi
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::src-tauri/Cargo.toml version ($CARGO_VERSION) does not match tag ($TAG_VERSION)"
            FAIL=1
          fi
          if [ "$TAURI_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::src-tauri/tauri.conf.json version ($TAURI_VERSION) does not match tag ($TAG_VERSION)"
            FAIL=1
          fi
          if [ "$FAIL" -ne 0 ]; then
            echo "::error::Version mismatch detected. Bump all three files to $TAG_VERSION before tagging."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            squashfs-tools

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          if PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null); then
            echo "Previous tag: $PREV_TAG"
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD")
          else
            echo "No previous tag found; using full git log"
            COMMITS=$(git log --pretty=format:"- %s (%h)")
          fi

          {
            echo "## Installation"
            echo ""
            echo "| Platform | File |"
            echo "|---|---|"
            echo "| Linux (all distros, including Arch) | \`.AppImage\` — portable, no installation required |"
            echo "| Linux Debian/Ubuntu | \`.deb\` |"
            echo "| Windows | \`.exe\` (NSIS installer) |"
            echo ""
            echo "> The \`.AppImage\` is patched to work on Arch / Mesa 24+ (no \`EGL_BAD_PARAMETER\` crash)."
            echo ""
            echo "### Auto-update"
            echo "ComdTeX checks for updates automatically on startup and installs them with one click."
            echo ""
            echo "### Optional dependencies"
            echo "- \`pandoc\` — required for PDF, DOCX and Beamer export"
            echo "- \`zip\` — required for vault backup"
            echo ""
            echo "## Changes"
            echo ""
            echo "$COMMITS"
          } > RELEASE_NOTES.md

          {
            echo "body<<EOF"
            cat RELEASE_NOTES.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build release (draft)
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ComdTeX ${{ github.ref_name }}
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Patch AppImage for EGL compatibility
        if: matrix.os == 'ubuntu-22.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          APPIMAGE=$(find src-tauri/target -name "*.AppImage" | grep -v ".zsync" | head -1)

          # Extract AppImage without FUSE.
          # AppImage Type 2: squashfs starts right after the ELF runtime.
          # Offset = e_shoff + e_shentsize * e_shnum (ELF64 section header table end).
          OFFSET=$(python3 -c "import struct; f=open('$APPIMAGE','rb'); f.seek(40); shoff=struct.unpack('<Q',f.read(8))[0]; f.seek(58); shentsz,shnum=struct.unpack('<HH',f.read(4)); print(shoff+shentsz*shnum)")
          echo "squashfs offset: $OFFSET"
          unsquashfs -o "$OFFSET" -d squashfs-root "$APPIMAGE"

          # Remove bundled libwayland-egl — incompatible with Mesa 24+.
          rm -f squashfs-root/usr/lib/libwayland-egl.so.1

          # Remove forced GDK_BACKEND=x11 and add WEBKIT_DISABLE_DMABUF_RENDERER.
          sed -i '/export GDK_BACKEND=x11/d' squashfs-root/apprun-hooks/linuxdeploy-plugin-gtk.sh
          echo 'export WEBKIT_DISABLE_DMABUF_RENDERER=1' >> squashfs-root/apprun-hooks/linuxdeploy-plugin-gtk.sh

          # Repack (--appimage-extract-and-run bypasses FUSE on GitHub runners)
          wget -q -O appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run squashfs-root "$APPIMAGE"
          rm -rf squashfs-root appimagetool

          # Re-sign patched AppImage for auto-updater
          npx tauri signer sign "$APPIMAGE" \
            --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
            --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"

          # Update latest.json with the new AppImage signature so auto-updates work
          gh release download "${{ github.ref_name }}" -p "latest.json" \
            --repo "${{ github.repository }}" 2>/dev/null || true
          if [ -f latest.json ]; then
            SIG=$(cat "${APPIMAGE}.sig")
            python3 -c "import json,sys; d=json.load(open('latest.json')); d.get('platforms',{}).get('linux-x86_64',{}).update({'signature':sys.argv[1]}); json.dump(d,open('latest.json','w'),indent=2)" "$SIG"
            gh release upload "${{ github.ref_name }}" latest.json \
              --clobber --repo "${{ github.repository }}"
          fi

          # Replace AppImage and sig in the draft release
          gh release upload "${{ github.ref_name }}" "$APPIMAGE" "${APPIMAGE}.sig" \
            --clobber \
            --repo "${{ github.repository }}"

      - name: Generate SHA256 checksums (Linux)
        if: matrix.os == 'ubuntu-22.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p checksums
          cd checksums
          # Find all bundle artifacts (AppImage, deb) but skip sig/zsync/sha256 sidecars.
          find ../src-tauri/target/*/release/bundle/ -type f \
            \( -name "*.AppImage" -o -name "*.deb" \) | while read -r f; do
            BASENAME=$(basename "$f")
            (cd "$(dirname "$f")" && sha256sum "$BASENAME") > "${BASENAME}.sha256"
            echo "Wrote ${BASENAME}.sha256"
            cat "${BASENAME}.sha256"
          done
          if ls *.sha256 >/dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" *.sha256 \
              --clobber --repo "${{ github.repository }}"
          else
            echo "::warning::No bundle artifacts found for checksum generation"
          fi

      - name: Generate SHA256 checksums (Windows)
        if: matrix.os == 'windows-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path checksums | Out-Null
          Set-Location checksums
          $files = Get-ChildItem -Path ../src-tauri/target/*/release/bundle/ -Recurse -Include *.exe, *.msi
          foreach ($f in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 -Path $f.FullName).Hash.ToLower()
            $line = "$hash  $($f.Name)"
            $outFile = "$($f.Name).sha256"
            Set-Content -Path $outFile -Value $line -NoNewline
            Write-Host "Wrote $outFile"
            Write-Host $line
          }
          $shaFiles = Get-ChildItem -Filter *.sha256
          if ($shaFiles.Count -gt 0) {
            gh release upload "${{ github.ref_name }}" $shaFiles.Name `
              --clobber --repo "${{ github.repository }}"
          } else {
            Write-Host "::warning::No bundle artifacts found for checksum generation"
          }

  publish:
    needs: [build]
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --draft=false \
            --repo "${{ github.repository }}"
