name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            squashfs-tools

      - name: Install frontend dependencies
        run: npm ci

      - name: Build release (draft)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ComdTeX ${{ github.ref_name }}
          releaseBody: |
            ## Instalación

            | Plataforma | Archivo |
            |---|---|
            | Linux (todas las distros) | `.AppImage` — portable, no requiere instalación |
            | Linux Debian/Ubuntu | `.deb` |
            | Windows | `.exe` (instalador NSIS) |

            **Arch Linux:** usa el `.AppImage` o instala desde AUR (próximamente).

            ### Auto-actualización
            La app verifica actualizaciones automáticamente al iniciar.

            ### Dependencias opcionales
            - `pandoc` — para exportar PDF, DOCX y Beamer
            - `zip` — para el backup del vault
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Patch AppImage for EGL compatibility
        if: matrix.os == 'ubuntu-22.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          APPIMAGE=$(find src-tauri/target -name "*.AppImage" | grep -v ".zsync" | head -1)
          APPIMAGE_NAME=$(basename "$APPIMAGE")

          # Extract AppImage without FUSE.
          # AppImage Type 2: squashfs starts right after the ELF runtime.
          # Offset = e_shoff + e_shentsize * e_shnum (ELF64 section header table end).
          OFFSET=$(python3 -c "import struct; f=open('$APPIMAGE','rb'); f.seek(40); shoff=struct.unpack('<Q',f.read(8))[0]; f.seek(58); shentsz,shnum=struct.unpack('<HH',f.read(4)); print(shoff+shentsz*shnum)")
          echo "squashfs offset: $OFFSET"
          unsquashfs -o "$OFFSET" -d squashfs-root "$APPIMAGE"

          # Remove bundled libwayland-egl — incompatible with Mesa 24+/Intel Arc on Arch/Fedora.
          # The system's own version will be used at runtime instead.
          rm -f squashfs-root/usr/lib/libwayland-egl.so.1

          # Remove forced GDK_BACKEND=x11 (causes EGL_BAD_PARAMETER on modern Mesa+Wayland).
          # Add WEBKIT_DISABLE_DMABUF_RENDERER as fallback for GPU configs without DMA-BUF support.
          sed -i '/export GDK_BACKEND=x11/d' squashfs-root/apprun-hooks/linuxdeploy-plugin-gtk.sh
          echo 'export WEBKIT_DISABLE_DMABUF_RENDERER=1' >> squashfs-root/apprun-hooks/linuxdeploy-plugin-gtk.sh

          # Repack
          wget -q -O appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          # --appimage-extract-and-run bypasses FUSE (unavailable on GitHub runners)
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run squashfs-root "$APPIMAGE"
          rm -rf squashfs-root appimagetool

          # Re-sign for auto-updater
          npx tauri signer sign "$APPIMAGE" --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password ""

          # Replace assets in the draft release
          gh release upload "${{ github.ref_name }}" "$APPIMAGE" "${APPIMAGE}.sig" \
            --clobber \
            --repo "${{ github.repository }}"

  publish:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --draft=false \
            --repo "${{ github.repository }}"
