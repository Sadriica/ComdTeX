name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ComdTeX ${{ github.ref_name }}
          releaseBody: |
            ## Instalación

            | Plataforma | Archivo |
            |---|---|
            | Linux (portable) | `.AppImage` |
            | Linux Debian/Ubuntu | `.deb` |
            | Linux Arch | `.pkg.tar.zst` |
            | Windows | `.exe` (instalador) |

            ### Auto-actualización
            La app verifica actualizaciones automáticamente al iniciar.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

  arch-release:
    needs: release
    permissions:
      contents: write

    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel \
            curl \
            file \
            git \
            webkit2gtk-4.1 \
            libayatana-appindicator \
            librsvg \
            openssl \
            patchelf \
            nodejs \
            npm

      - name: Install Rust
        run: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
        env:
          CARGO_HOME: /usr/local/cargo
          RUSTUP_HOME: /usr/local/rustup

      - uses: actions/checkout@v4

      - name: Install frontend dependencies
        run: npm ci

      - name: Build pacman bundle
        env:
          PATH: /usr/local/cargo/bin:${{ env.PATH }}
          CARGO_HOME: /usr/local/cargo
          RUSTUP_HOME: /usr/local/rustup
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: npm run tauri build -- --bundles pacman

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: src-tauri/target/release/bundle/pacman/*.pkg.tar.zst

  publish:
    needs: [release, arch-release]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Publish release (remove draft)
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const release = releases.data.find(r => r.tag_name === context.ref.replace('refs/tags/', ''));
            if (release) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                draft: false,
              });
            }
